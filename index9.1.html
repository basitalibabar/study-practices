<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body{
            background-color: lightgrey;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        form{
            width: 400px;
            padding: 20px;
            background-color: white;
            border: 2px solid gray;
            border-radius: 10px;
        }
        input[type="text"],
         input[type="email"],
          input[type="password"]
           input[type="number"]
            input[type="date"]
          tetarea{
            width: 100%;
            padding: 10px;
            border: 1px solid gray;
            border-radius: 5px;
            font-size: 10px;
          }
          input[type="file"]{
            margin: 10px 0;
          }
          input[type="radio"],
           input[type="checkbox"]{
            margin: 10px 5px 10px 0;
           }
           textarea{
            height: 100px;
            resize: none;
           }
          input[type="submit"]{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
          }
          input[type="reset"]{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: red;
          }
          button{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
          }
          select{
            width: 100%;
            padding: 5px;
          }
          input:focus,
          textarea:focus,
          select:focus{
            outline: ;
            border: 2px;
          }
    </style>
</head>

</body>
</html>
