<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1{
            height: 200px;
            width: 200px;
            background-color: rgb(0,0,0);
        }
        .box2{
            height: 200px;
            width: 200px;
            background: radial-gradient(red,green,yellow);
        }
        .box3{
            height: 200px;
            width: 200px;
            background: linear-gradient(to right, red,yellow,pink,green);
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
</body>
</html>
