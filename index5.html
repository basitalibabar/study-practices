<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .box1{
            height: 300px;
            width: 200px;
            background-color: green;
            -webkit-box-shadow: inset -1px 3px 8px 5px #1F87FF, 2px 5px 16px 0px #0B325E, 3px 2px 15px 10px rgba(224,50,36,0.25); 
box-shadow: inset -1px 3px 8px 5px #1F87FF, 2px 5px 16px 0px #0B325E, 3px 2px 15px 10px rgba(224,50,36,0.25);
        }
        .box2{
            clip-path:  inset -1px 3px 8px 5px #1F87FF, 2px 5px 16px 0px #0B325E, 3px 2px 15px 10px rgba(224,50,36,0.25);
        }
    </style>
    <div class="box1"></div>
    <div class="box2"></div>
</body>
