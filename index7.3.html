<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 1500px;
        }
        .box{
            height: 200px;
            width: 200px;
            border: 2px solid red;
            margin: 10px;
            display: inline-block;
        }
        /* .box1{
            position: relative;
            top: 30px;
            left: 20px;
        } */
        .box2{
            position: relative;
            top: 0;
            left: 0px;
        }
         .box3{
            height: 50px;
            width: 50px;
            background-color: blue;
            position: absolute;
            top: 0;
            left: 20px;
         }
        .box4{
            position: sticky;
            top: 10px;
            left: 0;
        }
        .box5{
            position: fixed;
        }
    </style>
</head>
<body>
    <div class="box box1"></div>
    <div class="box box2">
        <div class="box3"></div>
    </div>
    <div class="box box4"></div>
    <div class="box box5"></div>
</body>
</html>
