<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .image{
            background-image: url(Background\ 1.jpg);
            height: 900 px;
            width: 100%;
            background-size: cover;
            background-position: center;
            background-color: rgba(o,100,0,0.6);
            background-blend-mode: multiply;
        }
        .image h1{
            color: white;
            text-align: center;
        }
        .box1{
            height: 200 px;
            width: 200 px;
            /* border: 10 px;
            border-color: red;
            border-style: dotted; */
            border: 2px solid red;
            border-radius: 30 px;
        }
        .btn a{
            color: white;
            background-color: black;
            padding: 10 px;
            text-decoration: none;
            border-radius: 10 px;
            transition: all ease-in-out 0.3s;
        }
        .btn a:hover {
            background-color: blue;
        }
        .heading h1{
            color: white;
            background-color: black;
            padding-left: 100 px;
        }
    </style>
</head>
<body>
    <div class="image">
        <h1>Welcome to the website</h1>
    </div><br>
    <div class="box1"></div><br>
    <div class="btn">
        <a href="">Click Here</a>
    </div>
    <div class="heading">
        <h1>Hello world</h1>
    </div>
</body>
</html>
