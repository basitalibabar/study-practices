<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .hero{
            height: 700px;
            background-image: url();
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }
        .hero h1{
            font-size: 60px;
            opacity: 0;
            animation: headings 2s forwards;
        }
        .hero p{
            margin-top: 20px;
            font-size: 24px;
            opacity: 0;
            animation: paragraph 2s forwards;
            animation-delay: 2s;
        }
        @keyframes headings{
            to{
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes paragraph{
            from{
                opacity: 0;
                transform: translateY(50px);
            }
            to{
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>web development</h1>
        <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Repellat praesentium debitis non possimus sit explicabo ipsam minima molestiae quos error.</p>
    </div>
</body>
</html>
